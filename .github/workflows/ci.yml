name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: format, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format
        run: rustfmt --edition 2021 --check src/log.rs src/server.rs src/udp_uring.rs

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features

      - name: Minimal feature test
        run: cargo test --locked --no-default-features

  integration:
    name: black-box integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Build pathdns
        run: cargo build --locked

      - name: Run domain matching matrix
        working-directory: testing
        run: |
          set -euo pipefail
          cleanup() { kill "${PATHDNS_PID:-}" "${MOCK_PID:-}" 2>/dev/null || true; }
          trap cleanup EXIT
          python3 fastmock.py 5300 & MOCK_PID=$!
          ../target/debug/pathdns -c cfg_match.json & PATHDNS_PID=$!
          for _ in $(seq 1 100); do
            if python3 - <<'PY'
import socket
s = socket.socket()
s.settimeout(0.05)
try:
    s.connect(("127.0.0.1", 8080))
except OSError:
    raise SystemExit(1)
PY
            then break; fi
            sleep 0.1
          done
          kill -0 "$PATHDNS_PID"
          python3 test_match.py

      - name: Run inflight cap suite
        working-directory: testing
        run: python3 test_inflight_cap.py ../target/debug/pathdns

  fuzz:
    name: fuzz targets (smoke run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly, for -Z sanitizer instrumentation)
        run: rustup toolchain install nightly --profile minimal --no-self-update

      - name: Cache cargo registry and fuzz build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('fuzz/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fuzz-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # Not continuous fuzzing (that needs persistent corpus storage and far
      # more than a CI job's budget) — just a short timed run per target on
      # every push/PR, so a change that introduces a panic/overflow reachable
      # from raw wire bytes (DNS packets, `.mrs` ruleset files) fails CI
      # immediately instead of waiting to be found by a human or an attacker.
      - name: Fuzz smoke run (60s per target)
        run: |
          for target in fuzz_dns_wire fuzz_mrs_domain fuzz_mrs_ipcidr; do
            echo "::group::$target"
            cargo +nightly fuzz run "$target" -- -max_total_time=60
            echo "::endgroup::"
          done
